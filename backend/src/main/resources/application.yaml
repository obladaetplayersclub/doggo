spring:
  application:
    name: doggo-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/doggo}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:20MB}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

app:
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration: ${JWT_EXPIRATION:PT24H}
    jwt-issuer: ${JWT_ISSUER:doggo}
  storage:
    type: ${STORAGE_TYPE:s3}
    local-dir: ${STORAGE_LOCAL_DIR:./storage}
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    bucket: ${S3_BUCKET:doggo-files}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
  reviews:
    daily-limit: ${REVIEW_DAILY_LIMIT:10}
    min-length: ${REVIEW_MIN_LENGTH:10}
    max-length: ${REVIEW_MAX_LENGTH:1000}
  notifications:
    enabled: ${PUSH_NOTIFICATIONS_ENABLED:false}
