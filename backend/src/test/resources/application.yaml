spring:
  datasource:
    url: jdbc:h2:mem:doggo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

app:
  security:
    jwt-secret: test-secret-test-secret-test-secret-test-secret
    jwt-expiration: PT4H
    jwt-issuer: doggo-test
  storage:
    type: local
    local-dir: ./build/test-storage
    endpoint: http://localhost:9000
    bucket: doggo-test
    region: us-east-1
    access-key: test-access-key
    secret-key: test-secret-key
  reviews:
    daily-limit: 10
    min-length: 10
    max-length: 1000
  notifications:
    enabled: false
